<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Stray Hero — Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --amber:#e89446; --amber-2:#f4ac63; --crimson:#e23a4a; --teal:#2fd6c0; --lime:#8bd64a;
  --topbar:52px; --safe-t:0px; --safe-b:0px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0608;font-family:'Inter',system-ui,sans-serif;display:flex;justify-content:center}
.phone{position:relative;width:min(440px,100vw);height:100vh;overflow:hidden}

.hero-block{
  --amber:#e89446;--amber-2:#f4ac63;--crimson:#e23a4a;--teal:#2fd6c0;--lime:#8bd64a;
  position:relative;width:100%;height:100%;min-height:520px;overflow:hidden;
  background:#0b0608;display:flex;flex-direction:column;isolation:isolate;
}
.hero-bg{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.hero-photo-bg{position:absolute;inset:-4%;
  background:url('public/img/Stray-1-de-1080x1920-2-14jul22.jpg') center 30% / cover no-repeat;
  transform:scale(1.55) translateY(8%);transform-origin:center top;
  animation:heroPhotoDrift 30s ease-in-out infinite alternate;will-change:transform}
@keyframes heroPhotoDrift{0%{transform:scale(1.55) translateY(8%)}100%{transform:scale(1.62) translateY(6.5%)}}
.hero-glow{position:absolute;left:62%;top:30%;width:min(120vw,680px);aspect-ratio:1;transform:translate(-50%,-50%);
  mix-blend-mode:screen;background:radial-gradient(circle at 50% 50%,rgba(226,58,74,.42) 0%,rgba(180,30,46,.22) 32%,rgba(120,16,28,.1) 54%,transparent 70%);
  animation:heroGlowPulse 8s ease-in-out infinite}
@keyframes heroGlowPulse{0%,100%{opacity:.7;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}
.hero-bg::before,.hero-bg::after{content:'';position:absolute;border-radius:50%;filter:blur(54px);mix-blend-mode:screen;will-change:transform}
.hero-bg::before{width:300px;height:300px;left:-50px;top:14%;background:radial-gradient(circle,rgba(232,148,70,.34),transparent 70%);animation:heroOrbA 14s ease-in-out infinite}
.hero-bg::after{width:240px;height:240px;right:-40px;bottom:30%;background:radial-gradient(circle,rgba(47,214,192,.22),transparent 70%);animation:heroOrbB 17s ease-in-out infinite}
@keyframes heroOrbA{0%,100%{transform:translate(0,0)}50%{transform:translate(34px,28px)}}
@keyframes heroOrbB{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,-24px)}}
.hero-scrim{position:absolute;inset:0;background:
  linear-gradient(180deg,rgba(11,6,8,.82) 0%,rgba(11,6,8,.34) 16%,rgba(11,6,8,0) 38%,rgba(11,6,8,0) 44%,rgba(11,6,8,.55) 66%,rgba(11,6,8,.92) 86%,#0b0608 100%),
  radial-gradient(110% 80% at 50% 46%,transparent 42%,rgba(7,4,5,.5) 80%,rgba(7,4,5,.85) 100%)}

.hero-content{position:relative;z-index:5;flex:1;display:flex;flex-direction:column;
  padding:calc(var(--topbar) + var(--safe-t) + 14px) 20px clamp(48px,13vh,120px);text-align:center}
.hero-top{flex-shrink:0;margin-top:clamp(18vh,26vh,32vh)}
.hero-bottom{margin-top:auto;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:14px}

.hero-eyebrow{display:inline-flex;align-items:center;gap:7px;background:rgba(232,148,70,.12);
  border:1px solid rgba(232,148,70,.32);border-radius:20px;padding:5px 14px 5px 10px;
  font-size:11px;font-weight:600;letter-spacing:.04em;color:rgba(251,224,200,.9);backdrop-filter:blur(10px)}
.hero-eyebrow-dot{width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,#f4ac63,#e23a4a);
  box-shadow:0 0 8px rgba(232,148,70,.9);animation:heroDotPulse 2.4s ease-in-out infinite}
@keyframes heroDotPulse{0%,100%{box-shadow:0 0 6px rgba(232,148,70,.7)}50%{box-shadow:0 0 14px rgba(226,58,74,1)}}

.hero-headline{margin:16px auto 0;max-width:520px;font-size:clamp(28px,7.8vw,42px);font-weight:800;
  line-height:1.05;letter-spacing:-.02em;color:#fff2e8;text-shadow:0 2px 24px rgba(0,0,0,.6),0 1px 2px rgba(0,0,0,.5)}
.hero-headline em{font-style:normal;background:linear-gradient(135deg,#f4ac63,#e23a4a);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

.hero-cat{width:clamp(96px,26vw,140px);height:auto;display:block;margin:0 auto -6px;
  filter:drop-shadow(0 6px 18px rgba(0,0,0,.5)) drop-shadow(0 0 22px rgba(232,148,70,.35));
  transform-origin:50% 100%;animation:catBreath 4.6s ease-in-out infinite}
@keyframes catBreath{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}
.hero-cat .cat-tail{transform-origin:104px 132px;animation:catTail 3.4s ease-in-out infinite}
@keyframes catTail{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-9deg)}}
.hero-cat .cat-eye{animation:catEye 5.2s ease-in-out infinite}
@keyframes catEye{0%,92%,100%{opacity:1}96%{opacity:.15}}

.hero-feats{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.hfeat{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:12px;
  font-size:11.5px;font-weight:600;color:rgba(251,224,200,.86);background:rgba(40,20,16,.4);
  border:1px solid rgba(232,148,70,.22);backdrop-filter:blur(12px) saturate(150%);
  transition:transform .3s cubic-bezier(.16,1,.3,1),border-color .3s,background .3s,box-shadow .3s}
.hfeat svg{width:14px;height:14px;color:var(--amber-2)}
.hfeat:hover{transform:translateY(-2px);border-color:rgba(244,172,99,.5);background:rgba(58,28,20,.5);box-shadow:0 8px 22px rgba(200,60,30,.28)}

.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.hbtn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-width:112px;padding:13px 22px;
  border-radius:14px;font-size:14px;font-weight:600;letter-spacing:-.15px;cursor:pointer;position:relative;
  z-index:6;white-space:nowrap;overflow:hidden;backdrop-filter:blur(14px) saturate(140%);border:none;
  transition:transform .3s cubic-bezier(.16,1,.3,1),box-shadow .3s,background .3s,border-color .3s}
.hbtn::after{content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.28) 50%,transparent 70%);
  transform:translateX(-130%);transition:transform .6s ease}
.hbtn:hover::after{transform:translateX(130%)}
.hbtn:active{transform:scale(.96)}
.hbtn-green{color:#04210f;background:linear-gradient(180deg,#34d27a,#16a34a);border:1px solid rgba(120,255,180,.5);
  box-shadow:0 10px 30px rgba(22,163,74,.42),0 0 0 1px rgba(255,255,255,.18) inset}
.hbtn-green:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 16px 40px rgba(22,163,74,.6)}
.hbtn-gold{color:#2a1f00;background:linear-gradient(180deg,#fbd34d,#e0a615);border:1px solid rgba(255,235,150,.55);
  box-shadow:0 10px 30px rgba(224,166,21,.42),0 0 0 1px rgba(255,255,255,.2) inset}
.hbtn-gold:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 16px 40px rgba(224,166,21,.6)}
.hbtn-black{color:#f4ece2;background:linear-gradient(180deg,#26262e,#121216);border:1px solid rgba(255,255,255,.16);
  box-shadow:0 10px 30px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.06) inset}
.hbtn-black:hover{transform:translateY(-2px) scale(1.02);border-color:rgba(255,255,255,.3);box-shadow:0 16px 40px rgba(0,0,0,.6)}

.hero-gta-float{position:relative;z-index:6;display:flex;align-items:center;gap:10px;padding:10px 14px;
  max-width:320px;width:100%;background:rgba(34,16,14,.55);border:1px solid rgba(226,58,74,.32);border-radius:14px;
  cursor:pointer;backdrop-filter:blur(16px) saturate(160%);box-shadow:0 8px 26px rgba(0,0,0,.35);
  transition:border-color .2s,background .2s,transform .2s,box-shadow .25s}
.hero-gta-float:hover{border-color:rgba(226,58,74,.65);background:rgba(52,20,18,.65);transform:translateY(-2px);box-shadow:0 14px 32px rgba(226,58,74,.26)}
.hgta-img{width:40px;height:40px;border-radius:8px;overflow:hidden;flex-shrink:0;background:#2a0f0c}
.hgta-info{flex:1;min-width:0;text-align:left}
.hgta-tag{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#fb7185;margin-bottom:2px}
.hgta-name{font-size:13px;font-weight:600;color:rgba(255,255,255,.88)}
.hgta-price{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.hgta-chev{color:rgba(255,255,255,.3);flex-shrink:0}

@keyframes heroRise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.hero-eyebrow,.hero-headline,.hero-btns,.hero-gta-float,.hero-feats{animation:heroRise .7s cubic-bezier(.16,1,.3,1) both}
.hero-eyebrow{animation-delay:.04s}.hero-headline{animation-delay:.12s}
.hero-btns{animation-delay:.3s}.hero-gta-float{animation-delay:.4s}.hero-feats{animation-delay:.5s}
</style>
</head>
<body>
<div class="phone">
  <div class="hero-block">
    <div class="hero-bg" aria-hidden="true">
      <div class="hero-photo-bg"></div>
      <div class="hero-glow"></div>
      <div class="hero-scrim"></div>
    </div>
    <div class="hero-content">
      <div class="hero-top">
        <div class="hero-eyebrow"><span class="hero-eyebrow-dot"></span>PlayStation Turkey · Цифровой магазин</div>
        <h1 class="hero-headline">Игры и подписки<br>PlayStation <em>за минуты</em></h1>
      </div>
      <div class="hero-bottom">
        <div class="hero-btns">
          <button class="hbtn hbtn-green">Игры</button>
          <button class="hbtn hbtn-gold">Подписки</button>
          <button class="hbtn hbtn-black">Подписка Deluxe</button>
        </div>
        <div class="hero-gta-float">
          <div class="hgta-img"></div>
          <div class="hgta-info">
            <div class="hgta-tag">🔥 Предзаказ открыт</div>
            <div class="hgta-name">GTA VI — PlayStation 5</div>
            <div class="hgta-price">от 9 200 ₽</div>
          </div>
          <div class="hgta-chev"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></div>
        </div>
        <div class="hero-feats">
          <span class="hfeat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/></svg>Моментально</span>
          <span class="hfeat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6l8-4z"/></svg>Безопасно</span>
          <span class="hfeat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 4L2.5 11.5l6 2.2L17 7l-6 8 2 5 8.5-16z"/></svg>Telegram</span>
          <span class="hfeat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>24/7</span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
